name: Daily market data refresh

on:
  schedule:
    # 13:05 UTC = 4:05 PM Saudi Arabia (UTC+3), Monday-Friday (markets closed weekends)
    - cron: '5 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh market data in index.html
        run: python scripts/refresh_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "market-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto data refresh - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
